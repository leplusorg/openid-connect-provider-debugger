---
name: Luarocks Check Versions

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

defaults:
  run:
    working-directory: openid-connect-provider-debugger

jobs:
  luarocks-check-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check outdated dependencies
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          rc=0
          \sudo apt install -y luarocks
          while IFS=' ' read -r package current_version ; do
            latest_version="$(\luarocks search "${package}" --porcelain | \awk -F'\t' -v pkg="${package}" '$1 == pkg {print $2}' | \sort -Vr | \head -n 1)"
            if [ "${current_version}" != "${latest_version}" ]; then
              echo "${package} ${current_version} -> ${latest_version}"
              rc=$((rc+1))
            fi
          done < <(\lua -e 'local t = dofile("luarocks.lock"); for package, version in pairs(t.dependencies) do print(package .. " " .. version) end')
          exit ${rc}
