---
name: APK Check Versions

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  apk-check-versions:
    permissions:
      # Required to clone repo
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Set REPOSITORY
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'	
          echo "REPOSITORY=${GITHUB_REPOSITORY#*/}" >> "${GITHUB_ENV}"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check the versions
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          PINNED=$(awk -F= '/^[[:space:]]+[a-z0-9][a-z0-9._+-]*=[0-9]/ { gsub(/[[:space:]]/, "", $1); print $1 }' "${REPOSITORY}/Dockerfile")
          if [ -z "${PINNED}" ]; then
            echo "No pinned packages found in ${REPOSITORY}/Dockerfile" >&2
            exit 1
          fi
          echo "Pinned packages:"
          echo "${PINNED}"
          UPGRADABLE=$(docker run --pull always --rm --user root --entrypoint /bin/sh "leplusorg/${REPOSITORY}:main" -c 'apk update >/dev/null 2>&1 && apk -u list 2>/dev/null')
          OUTDATED=""
          for pkg in ${PINNED}; do
            if printf '%s\n' "${UPGRADABLE}" | grep -qE "^${pkg}-[0-9]"; then
              OUTDATED="${OUTDATED} ${pkg}"
            fi
          done
          if [ -n "${OUTDATED}" ]; then
            echo "The following pinned packages are outdated:${OUTDATED}" >&2
            exit 1
          fi
          echo "All pinned packages are up to date"
